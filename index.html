<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hospital Management System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>Hospital Management Panel</header>

    <nav class="main-nav">
        <a href="patients.html" class="nav-link">📚 Patients List</a>
        <a href="about.html" class="nav-link">ℹ️ About</a>
</nav>

<div class="container">
  <div class="section">
    <h2>Patient Registration</h2>
            <div class="form-group">
    <input id="firstName" placeholder="First Name">
    <input id="lastName" placeholder="Last Name">
    <input id="idNumber" placeholder="ID Number">
    <button id="addPatientBtn">Save</button>
  </div>

  <div class="section">
    <h2>Add Appointment</h2>
    <input id="appointmentId" placeholder="ID Number">
    <input id="appointmentDate" type="date">
    <button id="addAppointmentBtn">Add Appointment</button>
  </div>

  <div class="section">
    <h2>Treatment History</h2>
    <input id="treatmentId" placeholder="ID Number">
    <input id="treatmentDesc" placeholder="Treatment Description">
    <button id="addTreatmentBtn">Add</button>
  </div>
  
</div>

<script src="script.js"></script>
</body>
</html>
